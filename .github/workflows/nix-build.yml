name: Nix Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: nix build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check --no-build

      - name: nix build
        run: nix build .#gt --print-build-logs

      - name: Smoke test
        run: ./result/bin/gt --version
